<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #7c6af7;
    --user-bg: #1e1e2e;
    --ai-bg: #111;
    --font: 'Georgia', serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; }

  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #topbar h1 { font-size: 16px; font-weight: 400; letter-spacing: 0.05em; color: var(--text); }
  #model-select {
    margin-left: auto;
    background: var(--bg); color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; font-size: 13px; cursor: pointer;
    font-family: 'Courier New', monospace;
  }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #444; flex-shrink: 0; transition: background 0.3s;
  }
  #status-dot.ok { background: #4ade80; }
  #status-dot.err { background: #f87171; }

  #chat {
    flex: 1; overflow-y: auto; padding: 24px 0;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 740px; margin: 0 auto 2px; padding: 14px 24px;
    font-size: 15px; line-height: 1.75;
  }
  .msg.user {
    background: var(--user-bg);
    border-left: 2px solid var(--accent);
    color: #ccc;
  }
  .msg.ai { background: var(--ai-bg); color: var(--text); }
  .msg .role {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px; font-family: 'Courier New', monospace;
  }
  .msg.user .role { color: var(--accent); }
  .msg pre {
    background: #0a0a0a; border: 1px solid var(--border);
    border-radius: 6px; padding: 12px; overflow-x: auto;
    font-size: 13px; margin: 10px 0; font-family: 'Courier New', monospace;
  }
  .msg code { font-family: 'Courier New', monospace; font-size: 13px; color: #a78bfa; }
  .cursor::after { content: '▋'; animation: blink 0.8s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  #inputbar {
    padding: 16px 20px; border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex; gap: 10px; align-items: flex-end;
    max-width: 100%;
  }
  #prompt {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 16px; font-size: 15px; font-family: var(--font);
    resize: none; min-height: 48px; max-height: 200px; line-height: 1.5;
    outline: none; transition: border-color 0.2s;
  }
  #prompt:focus { border-color: var(--accent); }
  #send {
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    width: 48px; height: 48px; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s; flex-shrink: 0;
  }
  #send:hover { opacity: 0.85; }
  #send:disabled { opacity: 0.3; cursor: not-allowed; }

  #empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%;
    color: var(--muted); font-size: 14px; gap: 8px; text-align: center;
  }
  #empty big { font-size: 32px; opacity: 0.4; }
</style>
</head>
<body>

<div id="topbar">
  <div id="status-dot"></div>
  <h1>Ollama Chat</h1>
  <select id="model-select"><option value="">Cargando modelos…</option></select>
</div>

<div id="chat">
  <div id="empty">
    <big>◈</big>
    <span>Escribe algo para comenzar</span>
    <span style="font-size:12px">Conectando a Ollama en localhost:11434</span>
  </div>
</div>

<div id="inputbar">
  <textarea id="prompt" placeholder="Escribe tu mensaje…" rows="1"></textarea>
  <button id="send">➤</button>
</div>

<script>
const BASE = 'http://192.168.100.28:11434';
const chat = document.getElementById('chat');
const prompt = document.getElementById('prompt');
const sendBtn = document.getElementById('send');
const modelSel = document.getElementById('model-select');
const dot = document.getElementById('status-dot');
const empty = document.getElementById('empty');
let history = [];
let streaming = false;

async function loadModels() {
  try {
    const r = await fetch(`${BASE}/api/tags`);
    const d = await r.json();
    dot.className = 'ok';
    const models = d.models || [];
    modelSel.innerHTML = models.length
      ? models.map(m => `<option value="${m.name}">${m.name}</option>`).join('')
      : '<option value="">Sin modelos</option>';
  } catch {
    dot.className = 'err';
    modelSel.innerHTML = '<option value="">Sin conexión</option>';
  }
}

function renderMd(text) {
  return text
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addMsg(role, content, streaming = false) {
  empty.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="role">${role === 'user' ? 'Tú' : 'Ollama'}</div><div class="content${streaming ? ' cursor' : ''}">${renderMd(content)}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div.querySelector('.content');
}

async function send() {
  const text = prompt.value.trim();
  if (!text || streaming || !modelSel.value) return;
  prompt.value = '';
  prompt.style.height = 'auto';
  streaming = true;
  sendBtn.disabled = true;

  history.push({ role: 'user', content: text });
  addMsg('user', text);

  const contentEl = addMsg('ai', '', true);
  let reply = '';

  try {
    const res = await fetch(`${BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: modelSel.value, messages: history, stream: true })
    });

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = dec.decode(value).split('\n').filter(Boolean);
      for (const line of lines) {
        try {
          const j = JSON.parse(line);
          const token = j.message?.content || '';
          reply += token;
          contentEl.innerHTML = renderMd(reply);
          contentEl.classList.add('cursor');
          chat.scrollTop = chat.scrollHeight;
          if (j.done) contentEl.classList.remove('cursor');
        } catch {}
      }
    }
  } catch (e) {
    contentEl.textContent = 'Error: no se pudo conectar a Ollama.';
    contentEl.classList.remove('cursor');
  }

  history.push({ role: 'assistant', content: reply });
  contentEl.classList.remove('cursor');
  streaming = false;
  sendBtn.disabled = false;
  prompt.focus();
}

sendBtn.addEventListener('click', send);
prompt.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
prompt.addEventListener('input', () => {
  prompt.style.height = 'auto';
  prompt.style.height = Math.min(prompt.scrollHeight, 200) + 'px';
});

loadModels();
</script>
</body>
</html>
