<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexgenpente</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #cc1010;
    --user-bg: #1e1e2e;
    --ai-bg: #111;
    --font: 'Georgia', serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; }

  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #topbar h1 { font-size: 16px; font-weight: 400; letter-spacing: 0.05em; color: var(--text); }
  #tts-btn {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px;
    width: 32px; height: 32px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, border-color 0.2s;
  }
  #tts-btn:hover { color: var(--accent); border-color: var(--accent); }
  #tts-btn.active { color: var(--accent); border-color: var(--accent); }
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px;
    width: 32px; height: 32px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, border-color 0.2s;
  }
  #reset-btn:hover { color: var(--accent); border-color: var(--accent); }
    margin-left: auto;
    background: var(--bg); color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; font-size: 12px;
    font-family: 'Courier New', monospace;
  }
  #model-badge span { color: var(--accent); }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #444; flex-shrink: 0; transition: background 0.3s;
  }
  #status-dot.ok { background: #4ade80; }
  #status-dot.err { background: #f87171; }

  #chat {
    flex: 1; overflow-y: auto; padding: 24px 0;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 740px; margin: 0 auto 2px; padding: 14px 24px;
    font-size: 15px; line-height: 1.75;
  }
  .msg.user {
    background: var(--user-bg);
    border-left: 2px solid var(--accent);
    color: #ccc;
  }
  .msg.ai { background: var(--ai-bg); color: var(--text); }
  .msg .role {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px; font-family: 'Courier New', monospace;
  }
  .msg.user .role { color: var(--accent); }
  .msg pre {
    background: #0a0a0a; border: 1px solid var(--border);
    border-radius: 6px; padding: 12px; overflow-x: auto;
    font-size: 13px; margin: 10px 0; font-family: 'Courier New', monospace;
  }
  .msg code { font-family: 'Courier New', monospace; font-size: 13px; color: #e05555; }
  .cursor::after { content: '▋'; animation: blink 0.8s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  #inputbar {
    padding: 16px 20px; border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex; gap: 10px; align-items: flex-end;
    max-width: 100%;
  }
  #prompt {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 16px; font-size: 15px; font-family: var(--font);
    resize: none; min-height: 48px; max-height: 200px; line-height: 1.5;
    outline: none; transition: border-color 0.2s;
  }
  #prompt:focus { border-color: var(--accent); }
  #send {
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    width: 48px; height: 48px; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s; flex-shrink: 0;
  }
  #send:hover { opacity: 0.85; }
  #send:disabled { opacity: 0.3; cursor: not-allowed; }

  #empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%;
    color: var(--muted); font-size: 14px; gap: 8px; text-align: center;
  }
  #empty big { font-size: 32px; opacity: 0.4; }
</style>
</head>

- Nunca uses asteriscos (*) para enfatizar ni para nada. Si quieres enfatizar algo, hazlo con el tono y las palabras, no con símbolos raros.

Te explicas con claridad y das suficiente detalle para que se entienda, pero no te extiendes de más. 3 a 6 oraciones suele ser suficiente. Si el tema es complejo, te extiendes — si es simple, vas directo. No rellenas.`
  }
];
let streaming = false;

// Nombres de modelos — ajusta si los tuyos tienen nombre diferente
const MODEL_FAST = 'gpt-oss:120b-cloud';
const MODEL_SMART = 'gpt-oss:120b-cloud';
const MODEL_FAST_LABEL = 'Alexgenpente';
const MODEL_SMART_LABEL = 'Alexgenpente';

// Palabras clave que indican complejidad
const COMPLEX_KEYWORDS = /explica|por qué|cómo funciona|analiza|compara|código|programa|escribe|diferencia|ventajas|desventajas|historia|resumen|traduce|essay|explain|why|how does|analyze|compare|code|write|difference|advantages/i;

function pickModel(text) {
  const words = text.trim().split(/\s+/).length;
  const isComplex = words > 12 || COMPLEX_KEYWORDS.test(text);
  return isComplex ? MODEL_SMART : MODEL_FAST;
}

function pickLabel(model) {
  return model === MODEL_SMART ? MODEL_SMART_LABEL : MODEL_FAST_LABEL;
}

async function loadModels() {
  modelLabel.textContent = MODEL_FAST_LABEL;
}

function renderMd(text) {
  return text
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addMsg(role, content, modelUsed = '', streaming = false) {
  empty.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const roleLabel = role === 'user' ? 'Tú' : `Alexgenpente · <em style="color:#555;font-style:normal">${modelUsed}</em>`;
  div.innerHTML = `<div class="role">${roleLabel}</div><div class="content${streaming ? ' cursor' : ''}">${renderMd(content)}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div.querySelector('.content');
}

// ── SearXNG Search (gratis, sin key — requiere SearXNG local) ─────
// Para instalar SearXNG en Windows:
// 1. Instala Docker Desktop: https://www.docker.com/products/docker-desktop/
// 2. Ejecuta en PowerShell: docker run -d --name searxng -p 8888:8080 searxng/searxng
// 3. Verifica en: http://localhost:8888
const SEARXNG_URL = 'http://192.168.1.87:8888'; // Cambia el puerto si usas otro

const SEARCH_TRIGGERS = /hoy|ahorita|ahora|noticias|precio|cuánto cuesta|quién es|qué pasó|cuándo es|resultado|clima|tiempo en|partido|marcador|estreno|lanzamiento|último|reciente|actual|2024|2025|2026/i;

function needsSearch(text) {
  return SEARCH_TRIGGERS.test(text);
}

async function buscar(query) {
  try {
    const url = `${SEARXNG_URL}/search?q=${encodeURIComponent(query)}&format=json&language=es-MX&categories=general`;
    const res = await fetch(url, {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error(`SearXNG respondió ${res.status}`);
    const data = await res.json();

    const partes = [];

    // Hasta 5 resultados con título + snippet
    (data.results || []).slice(0, 5).forEach(r => {
      const titulo = r.title || '';
      const texto = r.content || '';
      const fuente = r.url || '';
      if (texto) partes.push(`[${titulo}]\n${texto}\nFuente: ${fuente}`);
    });

    // Respuesta directa si existe (infobox)
    if (data.infoboxes && data.infoboxes.length) {
      const box = data.infoboxes[0];
      if (box.content) partes.unshift(box.content);
    }

    if (!partes.length) {
      console.warn('[Search] SearXNG no devolvió resultados para:', query);
      return null;
    }
    return partes.join('\n\n---\n\n');
  } catch (e) {
    console.error('[Search] Error al buscar en SearXNG:', e.message);
    // Fallback: avisa al modelo que no pudo buscar
    return `(No se pudo obtener información actualizada: ${e.message})`;
  }
}

async function send() {
  const text = prompt.value.trim();
  if (!text || streaming) return;
  prompt.value = '';
  prompt.style.height = 'auto';
  streaming = true;
  sendBtn.disabled = true;

  const model = pickModel(text);
  modelLabel.textContent = pickLabel(model);

  addMsg('user', text);

  // Buscar en Google si el query lo amerita
  let mensajeParaModelo = text;
  if (needsSearch(text)) {
    const resultados = await buscar(text);
    if (resultados) {
      mensajeParaModelo = `El usuario pregunta: "${text}"\n\nResultados de búsqueda recientes:\n${resultados}\n\nResponde usando esa información, con tu estilo habitual.`;
    }
  }

  history.push({ role: 'user', content: mensajeParaModelo });

  const contentEl = addMsg('ai', '', pickLabel(model), true);
  let reply = '';

  try {
    const res = await fetch(`${BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, messages: history, stream: true })
    });

    dot.className = 'ok';
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = dec.decode(value).split('\n').filter(Boolean);
      for (const line of lines) {
        try {
          const j = JSON.parse(line);
          const token = j.message?.content || '';
          reply += token;
          contentEl.innerHTML = renderMd(reply);
          contentEl.classList.add('cursor');
          chat.scrollTop = chat.scrollHeight;
          if (j.done) contentEl.classList.remove('cursor');
        } catch {}
      }
    }
  } catch (e) {
    dot.className = 'err';
    contentEl.textContent = 'Error: no se pudo conectar a Alexgenpente.';
    contentEl.classList.remove('cursor');
  }

  history.push({ role: 'assistant', content: reply });
  contentEl.classList.remove('cursor');
  streaming = false;
  sendBtn.disabled = false;
  prompt.focus();
  speak(reply);
}

// ── TTS — Web Speech API (voces neurales del navegador) ──────────
let ttsEnabled = false;
let synth = window.speechSynthesis;
let ttsVoice = null;

function loadVoice() {
  const voices = synth.getVoices();
  // Prioridad: español México, luego español genérico
  ttsVoice =
    voices.find(v => v.lang === 'es-MX' && /jorge|male/i.test(v.name)) ||
    voices.find(v => v.lang === 'es-MX') ||
    voices.find(v => v.lang.startsWith('es')) ||
    voices[0];
  if (ttsVoice) console.log('[TTS] voz:', ttsVoice.name);
}

// Las voces cargan asíncrono en Chrome
speechSynthesis.onvoiceschanged = loadVoice;
loadVoice();

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const btn = document.getElementById('tts-btn');
  btn.classList.toggle('active', ttsEnabled);
  btn.textContent = ttsEnabled ? '🔊' : '🔇';
  btn.title = ttsEnabled ? 'Voz activada — click para desactivar' : 'Voz desactivada — click para activar';
  if (!ttsEnabled) synth.cancel();
}

function speak(text) {
  if (!ttsEnabled) return;
  const clean = text.replace(/<[^>]*>/g, '').trim();
  if (clean.length < 3) return;
  synth.cancel(); // cancela si ya había algo
  const utt = new SpeechSynthesisUtterance(clean);
  if (ttsVoice) utt.voice = ttsVoice;
  utt.lang  = 'es-MX';
  utt.rate  = 1.05;  // ligeramente más rápido — más natural
  utt.pitch = 1.0;
  synth.speak(utt);
}


function resetChat() {
  history = [history[0]];
  streaming = false;
  sendBtn.disabled = false;
  chat.innerHTML = `<div id="empty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:14px;gap:8px;text-align:center"><big style="font-size:32px;opacity:0.4">◈</big><span>Escribe algo para comenzar</span><span style="font-size:12px">Conectando a Alexgenpente en 192.168.1.87:11434</span></div>`;
  prompt.value = '';
  prompt.style.height = 'auto';
  prompt.focus();
}

sendBtn.addEventListener('click', send);
prompt.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
prompt.addEventListener('input', () => {
  prompt.style.height = 'auto';
  prompt.style.height = Math.min(prompt.scrollHeight, 200) + 'px';
});

loadModels();
</script>
